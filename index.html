<!doctype html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Story Share</title>

    <link rel="stylesheet" href="css/style.css" />
</head>

<body>
    <header>
        <h1>Story Share</h1>
    </header>

    <main>
        <section class="stories-container">
            <label class="add-story">
                <input type="file" id="storyInput" accept="image/*" hidden />
                <span>+</span>
            </label>

            <div id="storiesList"></div>
        </section>
    </main>

    <div class="story-modal" id="storyModal">
        <button class="close-btn" id="closeBtn">✕</button>

        <button class="nav-btn prev" id="prevBtn">❮</button>

        <img id="storyImage" alt="Story" />

        <button class="nav-btn next" id="nextBtn">❯</button>
    </div>

    <script src="js/script.js"></script>
</body>

</html>
